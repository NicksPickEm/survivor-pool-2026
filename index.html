<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 NCAA Survivor — Scenario Planner</title>
<style>
:root{
  --bg:#0f1117;--card:#1a1d27;--card2:#222536;--border:#2e3248;
  --text:#f0f2ff;--muted:#7b80a0;--dim:#3a3f58;
  --green:#22c55e;--gbg:#0d2818;
  --red:#ef4444;--rbg:#2a0d0d;
  --amber:#f59e0b;--abg:#2a1d05;
  --blue:#3b82f6;--bbg:#0d1a2e;
  --gold:#ffd700;
  --r:10px;--rsm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.hdr{padding:14px 16px;border-bottom:1px solid var(--border);background:var(--card);position:sticky;top:0;z-index:100;}
.hdr h1{font-size:16px;font-weight:800;}
.hdr p{font-size:11px;color:var(--muted);margin-top:2px;}
.scenario-bar{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--card2);display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.scenario-bar label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.scenario-tabs{display:flex;gap:6px;flex-wrap:wrap;}
.stab{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;}
.stab.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.sbtn{padding:5px 12px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;}
.sbtn.save{color:var(--green);border-color:var(--gbg);}
.sbtn.clear{color:var(--red);border-color:var(--rbg);}
.sbtn.new{color:var(--amber);border-color:var(--abg);}
.used-bar{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.used-bar label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;}
.used-chip{padding:3px 8px;border-radius:20px;background:var(--rbg);color:var(--red);border:1px solid #4a1515;font-size:11px;font-weight:700;}
.saving-bar{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.saving-bar label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;}
.saving-select{background:var(--card2);border:1px solid var(--border);border-radius:var(--rsm);color:var(--amber);font-size:12px;font-weight:700;font-family:inherit;padding:5px 10px;outline:none;cursor:pointer;}
.saving-note{font-size:11px;color:var(--dim);font-style:italic;}
.main{padding:16px;display:flex;gap:12px;overflow-x:auto;padding-bottom:24px;}
.day-col{flex-shrink:0;width:200px;cursor:grab;}
.day-col.dragging{opacity:.4;cursor:grabbing;}
.day-col.drag-over{outline:2px dashed var(--blue);border-radius:var(--r);}
.day-hdr{background:var(--card2);border-radius:var(--r) var(--r) 0 0;padding:10px 12px;border:1px solid var(--border);border-bottom:none;display:flex;align-items:flex-start;gap:6px;}
.drag-handle{color:var(--dim);font-size:14px;cursor:grab;padding-top:2px;flex-shrink:0;user-select:none;}
.day-hdr-text{flex:1;}
.day-hdr .round{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em;}
.day-hdr .date{font-size:14px;font-weight:800;margin-top:2px;}
.day-pick{font-size:10px;color:var(--amber);font-weight:700;margin-top:4px;min-height:14px;}
.matchups{border:1px solid var(--border);border-radius:0 0 var(--r) var(--r);overflow:hidden;}
.matchup{border-bottom:1px solid var(--border);}
.matchup:last-child{border-bottom:none;}
.team-btn{width:100%;padding:10px 12px;background:var(--card);border:none;color:var(--text);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;text-align:left;display:flex;align-items:center;gap:8px;}
.team-btn:hover:not(.used):not(.saving):not(.ph){background:var(--card2);}
.team-btn.picked{background:var(--gbg);color:var(--green);}
.team-btn.picked::after{content:"✓";margin-left:auto;color:var(--green);}
.team-btn.used{background:var(--rbg);color:var(--red);opacity:.6;cursor:not-allowed;text-decoration:line-through;}
.team-btn.used::after{content:"USED";margin-left:auto;font-size:9px;color:var(--red);}
.team-btn.saving{background:var(--abg);color:var(--amber);cursor:not-allowed;}
.team-btn.saving::after{content:"SAVING";margin-left:auto;font-size:9px;color:var(--amber);}
.team-btn.ph{color:var(--dim);cursor:default;font-style:italic;font-size:11px;}
.vs-div{padding:3px 12px;background:var(--bg);display:flex;align-items:center;gap:6px;}
.vs-div::before,.vs-div::after{content:'';flex:1;height:1px;background:var(--border);}
.vs-div span{font-size:8px;color:var(--dim);font-weight:800;letter-spacing:.1em;}
.seed{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0;}
.s1{background:#ffd700;color:#000;}.s2{background:#c0c0c0;color:#000;}.s3{background:#cd7f32;color:#fff;}
.s4{background:var(--blue);color:#fff;}.s567{background:var(--card2);color:var(--text);}.slo{background:var(--card2);color:var(--muted);}
.kp{font-size:9px;color:var(--dim);margin-left:auto;flex-shrink:0;}
.saved-section{padding:16px;}
.saved-section h2{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.saved-section h2::after{content:'';flex:1;height:1px;background:var(--border);}
.saved-grid{display:flex;gap:10px;flex-wrap:wrap;}
.saved-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;min-width:180px;}
.saved-card h3{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--amber);}
.saved-pick{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px;}
.saved-pick .day{color:var(--muted);font-size:10px;width:60px;flex-shrink:0;}
.saved-pick .team{font-weight:700;color:var(--green);}
.saved-pick .team.champ{color:var(--gold);}
.del-btn{margin-top:10px;padding:4px 10px;border-radius:var(--rsm);border:1px solid #4a1515;background:var(--rbg);color:var(--red);cursor:pointer;font-size:11px;font-family:inherit;}
.empty-saved{color:var(--dim);font-size:13px;font-style:italic;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:9px 18px;border-radius:20px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .18s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>🏀 2026 NCAA Survivor — Scenario Planner</h1>
    <p>Click a team to pick them · Drag columns to reorder · Can't reuse a team</p>
  </div>
</div>

<div class="scenario-bar">
  <label>Scenario:</label>
  <div class="scenario-tabs" id="scenario-tabs"></div>
  <button class="sbtn new" onclick="newScenario()">+ New</button>
  <button class="sbtn save" onclick="saveScenario()">💾 Save</button>
  <button class="sbtn clear" onclick="clearScenario()">✕ Clear</button>
</div>

<div class="used-bar">
  <label>Already used:</label>
  <span class="used-chip">Nebraska</span>
  <span class="used-chip">Kansas</span>
  <span class="used-chip">Purdue</span>
  <span class="used-chip">Arkansas</span>
</div>

<div class="saving-bar">
  <label>Saving for champ:</label>
  <select class="saving-select" id="saving-select" onchange="changeSaving()">
    <option value="">— None —</option>
  </select>
  <span class="saving-note" id="saving-note"></span>
</div>

<div class="main" id="main"></div>

<div class="saved-section">
  <h2>Saved Scenarios</h2>
  <div class="saved-grid" id="saved-grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const PREUSED = new Set(["Nebraska","Kansas","Purdue","Arkansas"]);
let savingTeam = "Michigan";

const KP = {Duke:1,Arizona:2,Michigan:3,"Iowa State":5,Houston:4,Illinois:6,UConn:7,"Michigan State":9,Nebraska:14,"St. John's":11,Alabama:13,Tennessee:16,Arkansas:10,Iowa:22,Texas:25,Purdue:2};
const SEEDS = {Duke:1,Michigan:1,Arizona:1,Florida:1,Houston:2,UConn:2,Purdue:2,"Iowa State":2,"Michigan State":3,Illinois:3,Kansas:4,Nebraska:4,Arkansas:4,Alabama:4,"St. John's":5,"Texas Tech":5,Texas:11,Iowa:9,"Utah State":9,"Saint Louis":9,Tennessee:6,Kentucky:7,UCLA:7,"Miami (FL)":7};
const ALL_TEAMS = ["Duke","Michigan","Arizona","Iowa State","Houston","Illinois","UConn","Michigan State","Nebraska","St. John's","Alabama","Tennessee","Arkansas","Iowa","Texas","Purdue","Kansas","Virginia","Kentucky","UCLA","Vanderbilt","Texas Tech","Miami (FL)","Utah State","Saint Louis"];

const BASE_DAYS = [
  {id:"thu-mar26",label:"Thu Mar 26",round:"Sweet 16",matchups:[["Texas","Purdue"],["Iowa","Nebraska"],["Arizona","Arkansas"],["Illinois","Houston"]]},
  {id:"fri-mar27",label:"Fri Mar 27",round:"Sweet 16",matchups:[["St. John's","Duke"],["Alabama","Michigan"],["Michigan State","UConn"],["Tennessee","Iowa State"]]},
  {id:"sat-mar28",label:"Sat Mar 28",round:"Elite Eight",matchups:[["Thu G1 winner","Thu G2 winner"],["Thu G3 winner","Thu G4 winner"]]},
  {id:"sun-mar29",label:"Sun Mar 29",round:"Elite Eight",matchups:[["Fri G1 winner","Fri G2 winner"],["Fri G3 winner","Fri G4 winner"]]},
  {id:"sat-apr4", label:"Sat Apr 4", round:"Final Four", matchups:[["Sat E8 G1 winner","Sat E8 G2 winner"],["Sun E8 G1 winner","Sun E8 G2 winner"]]},
  {id:"mon-apr6", label:"Mon Apr 6", round:"Championship",matchups:[["FF G1 winner","FF G2 winner"]]},
];

// Column order (indices into BASE_DAYS) — drag reorders this
let colOrder = [0,1,2,3,4,5];

let scenarios = [{}];
let currentIdx = 0;
let savedScenarios = JSON.parse(localStorage.getItem('ncaa_scenarios3') || '[]');

// Drag state
let dragSrcIdx = null; // index in colOrder

function initSavingSelect(){
  const sel = document.getElementById('saving-select');
  ALL_TEAMS.forEach(t => {
    if(!PREUSED.has(t)){
      const o = document.createElement('option');
      o.value = t; o.textContent = t;
      if(t === savingTeam) o.selected = true;
      sel.appendChild(o);
    }
  });
  updateSavingNote();
}

function changeSaving(){
  savingTeam = document.getElementById('saving-select').value;
  updateSavingNote();
  render();
}

function updateSavingNote(){
  document.getElementById('saving-note').textContent = savingTeam ? `${savingTeam} locked — shown as SAVING` : '';
}

function currentPicks(){ return scenarios[currentIdx]; }

function getUsed(){
  const used = new Set(PREUSED);
  Object.values(currentPicks()).forEach(t => { if(t) used.add(t); });
  return used;
}

function pickTeam(dayId, team){
  if(PREUSED.has(team)) return;
  if(savingTeam && team === savingTeam) return;
  const used = getUsed();
  const existing = currentPicks()[dayId];
  if(used.has(team) && team !== existing) return;
  if(existing === team) delete currentPicks()[dayId];
  else currentPicks()[dayId] = team;
  render();
}

function sdClass(s){
  if(!s) return 'slo';
  if(s===1) return 's1'; if(s===2) return 's2'; if(s===3) return 's3';
  if(s===4) return 's4'; if(s<=7) return 's567'; return 'slo';
}

function render(){
  const picks = currentPicks();
  const used = getUsed();

  // Tabs
  const tabs = document.getElementById('scenario-tabs');
  tabs.innerHTML = '';
  scenarios.forEach((_,i) => {
    const b = document.createElement('button');
    b.className = 'stab'+(i===currentIdx?' active':'');
    b.textContent = `Scenario ${i+1}`;
    b.onclick = () => { currentIdx=i; render(); };
    tabs.appendChild(b);
  });

  // Main grid
  const main = document.getElementById('main');
  main.innerHTML = '';

  colOrder.forEach((dayIdx, orderPos) => {
    const day = BASE_DAYS[dayIdx];
    const col = document.createElement('div');
    col.className = 'day-col';
    col.draggable = true;
    col.dataset.orderPos = orderPos;

    // Drag events
    col.addEventListener('dragstart', e => {
      dragSrcIdx = orderPos;
      col.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    col.addEventListener('dragend', () => {
      col.classList.remove('dragging');
      document.querySelectorAll('.day-col').forEach(c => c.classList.remove('drag-over'));
    });
    col.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.day-col').forEach(c => c.classList.remove('drag-over'));
      col.classList.add('drag-over');
    });
    col.addEventListener('drop', e => {
      e.preventDefault();
      col.classList.remove('drag-over');
      const destPos = parseInt(col.dataset.orderPos);
      if(dragSrcIdx === null || dragSrcIdx === destPos) return;
      // Swap
      const tmp = colOrder[dragSrcIdx];
      colOrder[dragSrcIdx] = colOrder[destPos];
      colOrder[destPos] = tmp;
      dragSrcIdx = null;
      render();
    });

    const pick = picks[day.id];

    const hdr = document.createElement('div');
    hdr.className = 'day-hdr';
    hdr.innerHTML = `<span class="drag-handle" title="Drag to reorder">⠿</span><div class="day-hdr-text"><div class="round">${day.round}</div><div class="date">${day.label}</div><div class="day-pick">${pick ? '✓ '+pick : ''}</div></div>`;
    col.appendChild(hdr);

    const mDiv = document.createElement('div');
    mDiv.className = 'matchups';

    day.matchups.forEach((matchup, mi) => {
      const mWrap = document.createElement('div');
      mWrap.className = 'matchup';

      matchup.forEach((team, ti) => {
        const isPlaceholder = team.includes('winner');
        const isPicked = pick === team;
        const isSaving = savingTeam && team === savingTeam;
        const isUsed = !isPicked && (used.has(team) || PREUSED.has(team));

        const btn = document.createElement('button');
        let cls = 'team-btn';
        if(isPlaceholder) cls += ' ph';
        else if(isPicked) cls += ' picked';
        else if(isSaving) cls += ' saving';
        else if(isUsed) cls += ' used';
        btn.className = cls;

        const s = SEEDS[team];
        const kp = KP[team];
        const seedHtml = s && !isPlaceholder ? `<span class="seed ${sdClass(s)}">${s}</span>` : '';
        const kpHtml = kp && !isPlaceholder ? `<span class="kp">#${kp}</span>` : '';
        btn.innerHTML = `${seedHtml}<span>${team}</span>${kpHtml}`;

        if(!isPlaceholder && !isSaving){
          btn.onclick = () => pickTeam(day.id, team);
        }
        mWrap.appendChild(btn);

        if(ti === 0){
          const vs = document.createElement('div');
          vs.className = 'vs-div';
          vs.innerHTML = '<span>VS</span>';
          mWrap.appendChild(vs);
        }
      });

      mDiv.appendChild(mWrap);
    });

    col.appendChild(mDiv);
    main.appendChild(col);
  });

  renderSaved();
}

function renderSaved(){
  const grid = document.getElementById('saved-grid');
  grid.innerHTML = '';
  if(!savedScenarios.length){
    grid.innerHTML = '<div class="empty-saved">No saved scenarios yet.</div>';
    return;
  }
  savedScenarios.forEach((s,i) => {
    const card = document.createElement('div');
    card.className = 'saved-card';
    let html = `<h3>${s.name}</h3>`;
    if(s.saving) html += `<div style="font-size:10px;color:var(--amber);margin-bottom:6px;">🏆 Saving: ${s.saving}</div>`;
    BASE_DAYS.forEach(day => {
      const pick = s.picks[day.id];
      if(pick){
        const isChamp = day.id==='mon-apr6';
        html += `<div class="saved-pick"><span class="day">${day.label.replace(/\w+ /,'')}</span><span class="team${isChamp?' champ':''}">${pick}</span></div>`;
      }
    });
    card.innerHTML = html;
    const del = document.createElement('button');
    del.className = 'del-btn'; del.textContent = 'Delete';
    del.onclick = () => { savedScenarios.splice(i,1); localStorage.setItem('ncaa_scenarios3',JSON.stringify(savedScenarios)); renderSaved(); };
    card.appendChild(del);
    grid.appendChild(card);
  });
}

function saveScenario(){
  const picks = currentPicks();
  if(!Object.keys(picks).length){ toast('No picks to save!'); return; }
  savedScenarios.push({name:`Scenario ${savedScenarios.length+1}`, picks:{...picks}, saving: savingTeam});
  localStorage.setItem('ncaa_scenarios3', JSON.stringify(savedScenarios));
  toast('Saved ✓');
  renderSaved();
}

function clearScenario(){ scenarios[currentIdx]={}; render(); toast('Cleared'); }
function newScenario(){ scenarios.push({}); currentIdx=scenarios.length-1; render(); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }

initSavingSelect();
render();
</script>
</body>
</html>
