<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>2026 NCAA Survivor</title>
<style>
:root {
  --bg:#0f1117; --card:#1a1d27; --card2:#222536; --border:#2e3248;
  --text:#f0f2ff; --muted:#7b80a0; --dim:#3a3f58;
  --green:#22c55e; --gbg:#0d2818; --gdim:#134d28;
  --red:#ef4444; --rbg:#2a0d0d;
  --amber:#f59e0b; --abg:#2a1d05;
  --blue:#3b82f6; --bbg:#0d1a2e;
  --purple:#a855f7; --pbg:#1a0d2e;
  --r:14px; --rsm:9px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);max-width:520px;margin:0 auto;padding-bottom:84px;}

/* HEADER */
.hdr{padding:18px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:50;}
.hdr-l h1{font-size:19px;font-weight:800;letter-spacing:-.4px;}
.hdr-l p{font-size:11px;color:var(--muted);margin-top:2px;}
.hdr-r{display:flex;gap:6px;}
.icobtn{width:36px;height:36px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:50;}
.nbtn{flex:1;padding:10px 4px 16px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:inherit;}
.nbtn.active{color:var(--blue);}
.nbtn svg{width:22px;height:22px;}
.nbtn span{font-size:10px;font-weight:600;}

/* PAGES */
.pg{display:none;padding:0 14px;}
.pg.active{display:block;}

/* ── TODAY PAGE ── */
.today-hero{margin:14px 0 10px;}
.day-nav{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:12px;}
.day-nav-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--card2);color:var(--muted);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
.day-nav-btn:disabled{opacity:.3;cursor:default;}
.day-center{text-align:center;}
.day-name{font-size:17px;font-weight:800;letter-spacing:-.3px;}
.day-sub{font-size:12px;color:var(--muted);margin-top:2px;}

.my-pick-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;}
.mpb-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.pick-set{display:flex;align-items:center;gap:12px;background:var(--gbg);border:1px solid var(--gdim);border-radius:var(--rsm);padding:13px 14px;}
.pick-empty{display:flex;align-items:center;justify-content:center;gap:10px;background:var(--card2);border:1px dashed var(--dim);border-radius:var(--rsm);padding:16px;color:var(--muted);font-size:13px;}
.ps-seed{width:38px;height:38px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;}
.ps-info{flex:1;}
.ps-team{font-size:16px;font-weight:700;}
.ps-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.ps-clear{width:28px;height:28px;border-radius:50%;border:1px solid var(--dim);background:transparent;color:var(--muted);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}

.day-section-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:12px 0 8px;}

/* TEAM PICK ROWS */
.tprow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;margin-bottom:7px;cursor:pointer;transition:border-color .12s;}
.tprow:active{opacity:.75;}
.tprow.is-pick{border-color:var(--green);background:var(--gbg);box-shadow:0 0 0 2px var(--green);}
.tprow.is-elim{border-color:#3a1515;background:var(--rbg);opacity:.4;cursor:default;}
.tprow.is-used{border-color:var(--dim);background:var(--card2);opacity:.5;cursor:default;}
.tprow.plan-use{border-color:var(--green);}
.tprow.plan-save{border-color:var(--blue);}
.tprow.plan-maybe{border-color:var(--amber);}
.tprow.plan-skip{opacity:.45;}
.tp-seed{width:34px;height:34px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;}
.tp-info{flex:1;min-width:0;}
.tp-team{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tp-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.tp-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.tp-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;}
.badge-pick{background:var(--green);color:#000;}
.badge-elim{background:var(--rbg);color:var(--red);border:1px solid #4a1515;}
.badge-used{background:var(--dim);color:var(--muted);}
.plan-icon{font-size:16px;}

/* ── HISTORY PAGE ── */
.hist-day{margin-bottom:20px;}
.hist-day-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:12px 0 8px;display:flex;align-items:center;gap:8px;}
.hist-day-label::after{content:'';flex:1;height:1px;background:var(--border);}
.hist-pick{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;margin-bottom:7px;}
.hist-pick.won{border-color:var(--gdim);background:var(--gbg);}
.hist-pick.lost{border-color:#4a1515;background:var(--rbg);opacity:.7;}
.hist-pick.pending{border-color:var(--dim);}
.hp-seed{width:32px;height:32px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
.hp-info{flex:1;}
.hp-team{font-size:15px;font-weight:700;}
.hp-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.hp-result{font-size:12px;font-weight:700;}
.result-win{color:var(--green);}
.result-loss{color:var(--red);}
.result-pending{color:var(--amber);}

/* ── RESULTS PAGE ── */
.res-day-section{margin-bottom:18px;}
.game-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:7px;overflow:hidden;}
.game-hdr{font-size:10px;color:var(--muted);padding:6px 14px;background:var(--card2);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.07em;}
.game-team-row{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;border-bottom:1px solid var(--border);}
.game-team-row:last-of-type{border-bottom:none;}
.game-team-row:active{opacity:.75;}
.game-team-row.won{background:var(--gbg);}
.game-team-row.lost{background:var(--rbg);opacity:.55;}
.game-team-row.won .gtr-name{color:var(--green);font-weight:700;}
.game-team-row.lost .gtr-name{text-decoration:line-through;color:var(--muted);}
.gtr-seed{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.gtr-name{flex:1;font-size:14px;font-weight:600;}
.gtr-ico{font-size:15px;}
.undo-row{padding:6px 14px;display:flex;justify-content:flex-end;background:var(--card2);border-top:1px solid var(--border);}
.undo-btn{font-size:11px;color:var(--muted);background:none;border:1px solid var(--dim);border-radius:6px;padding:4px 10px;cursor:pointer;font-family:inherit;}

/* ── PLAN PAGE ── */
.plan-filter{display:flex;gap:6px;overflow-x:auto;padding:10px 0 6px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.plan-filter::-webkit-scrollbar{display:none;}
.pchip{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;flex-shrink:0;}
.pchip.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.plan-team{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:7px;}
.plan-team.s-use{border-color:var(--green);}
.plan-team.s-save{border-color:var(--blue);}
.plan-team.s-maybe{border-color:var(--amber);}
.plan-team.s-skip{opacity:.4;}
.plan-team.s-elim{opacity:.35;background:var(--rbg);border-color:#3a1515;}
.plan-team.s-used{opacity:.45;background:var(--card2);}
.pt-seed{width:32px;height:32px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
.pt-info{flex:1;min-width:0;}
.pt-team{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pt-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.pt-btns{display:flex;gap:4px;flex-shrink:0;}
.ptbtn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--card2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.ptbtn.on-use{background:var(--green);border-color:var(--green);}
.ptbtn.on-save{background:var(--blue);border-color:var(--blue);}
.ptbtn.on-maybe{background:var(--amber);border-color:var(--amber);}
.ptbtn.on-skip{background:var(--dim);border-color:var(--dim);}

/* SEED COLORS */
.sd1{background:#ffd700;color:#000;}
.sd2{background:#c0c0c0;color:#000;}
.sd3{background:#cd7f32;color:#fff;}
.sd4{background:var(--blue);color:#fff;}
.sd567{background:var(--card2);color:var(--text);}
.sdlo{background:var(--card2);color:var(--muted);}

/* REGION DOTS */
.rdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.rE{background:#3b82f6;}.rW{background:#22c55e;}.rS{background:#ef4444;}.rM{background:#a855f7;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--card);border-radius:var(--r) var(--r) 0 0;padding:18px 16px 40px;width:100%;max-width:520px;border:1px solid var(--border);}
.modal-handle{width:36px;height:4px;background:var(--dim);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:17px;font-weight:800;margin-bottom:3px;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:16px;}
.modal-option{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card2);border:1px solid var(--border);border-radius:var(--rsm);margin-bottom:8px;cursor:pointer;}
.modal-option:active{opacity:.8;}
.modal-option.sel{border-color:var(--green);background:var(--gbg);}
.mo-ico{font-size:22px;width:30px;text-align:center;}
.mo-lbl{font-size:14px;font-weight:700;}
.mo-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.modal-cancel{width:100%;margin-top:4px;padding:14px;background:var(--card2);border:1px solid var(--border);border-radius:var(--rsm);color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}

/* STATS STRIP */
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:12px 0;}
.ssc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 8px;text-align:center;}
.ssn{font-size:21px;font-weight:800;letter-spacing:-.5px;}
.ssl{font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.05em;}

/* TOAST */
.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .2s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;}

.empty{text-align:center;padding:36px 20px;color:var(--muted);font-size:14px;}
.empty .emo{font-size:34px;margin-bottom:10px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <h1>🏀 NCAA Survivor</h1>
    <p>2026 Tournament · 1 pick per day</p>
  </div>
  <div class="hdr-r">
    <button class="icobtn" onclick="expJSON()" title="Export">📤</button>
    <button class="icobtn" onclick="document.getElementById('fimp').click()" title="Import">📥</button>
    <input type="file" id="fimp" accept=".json" style="display:none" onchange="impJSON(event)">
  </div>
</div>

<!-- TODAY -->
<div id="pg-today" class="pg active">
  <div class="stats-strip">
    <div class="ssc"><div class="ssn" id="st-used" style="color:var(--amber)">0</div><div class="ssl">Used</div></div>
    <div class="ssc"><div class="ssn" id="st-alive" style="color:var(--green)">64</div><div class="ssl">Alive</div></div>
    <div class="ssc"><div class="ssn" id="st-avail" style="color:var(--blue)">0</div><div class="ssl">Today</div></div>
    <div class="ssc"><div class="ssn" id="st-remain" style="color:var(--purple)">0</div><div class="ssl">Remaining</div></div>
  </div>

  <div class="day-nav">
    <button class="day-nav-btn" id="prev-btn" onclick="changeDay(-1)">‹</button>
    <div class="day-center">
      <div class="day-name" id="day-name">—</div>
      <div class="day-sub" id="day-sub">—</div>
    </div>
    <button class="day-nav-btn" id="next-btn" onclick="changeDay(1)">›</button>
  </div>

  <div class="my-pick-box">
    <div class="mpb-label">
      <span>My pick</span>
      <span id="pick-status-label" style="font-size:11px;"></span>
    </div>
    <div id="pick-display"></div>
  </div>

  <div class="day-section-label" id="games-label">Today's games</div>
  <div id="today-teams"></div>
</div>

<!-- HISTORY -->
<div id="pg-history" class="pg">
  <div id="history-list" style="padding-top:4px;"></div>
</div>

<!-- RESULTS -->
<div id="pg-results" class="pg">
  <div id="results-list" style="padding-top:4px;"></div>
</div>

<!-- PLAN -->
<div id="pg-plan" class="pg">
  <div class="plan-filter" id="plan-filter">
    <button class="pchip active" onclick="setPlanFilter('all',this)">All</button>
    <button class="pchip" onclick="setPlanFilter('available',this)">Available</button>
    <button class="pchip" onclick="setPlanFilter('use',this)">🎯 Use</button>
    <button class="pchip" onclick="setPlanFilter('save',this)">⭐ Save</button>
    <button class="pchip" onclick="setPlanFilter('maybe',this)">🤔 Maybe</button>
    <button class="pchip" onclick="setPlanFilter('skip',this)">🚫 Skip</button>
    <button class="pchip" onclick="setPlanFilter('used',this)">✓ Used</button>
    <button class="pchip" onclick="setPlanFilter('elim',this)">💀 Out</button>
  </div>
  <div id="plan-list"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <button class="nbtn active" onclick="showPg('today',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    <span>Today</span>
  </button>
  <button class="nbtn" onclick="showPg('history',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span>My Picks</span>
  </button>
  <button class="nbtn" onclick="showPg('results',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span>Results</span>
  </button>
  <button class="nbtn" onclick="showPg('plan',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    <span>Plan</span>
  </button>
</nav>

<!-- MODAL -->
<div class="modal-bg" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="m-title"></div>
    <div class="modal-sub" id="m-sub"></div>
    <div id="m-opts"></div>
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── STATE ────────────────────────────────────────────────────────
let picks   = {};   // dayId -> teamName
let results = {};   // dayId -> { gameIdx: { w, l } }
let plan    = {};   // teamName -> { status: 'none'|'use'|'save'|'maybe'|'skip' }
TEAMS.forEach(t => { plan[t.team] = { status:'none' }; });
DAYS.forEach(d => { results[d.id] = {}; });

let currentDayIdx = 2; // default to Thu Mar 19 (first real games)
let planFilter = 'all';

// ── DERIVED ──────────────────────────────────────────────────────
function getElim() {
  const e = new Set();
  Object.values(results).forEach(dr => Object.values(dr).forEach(g => { if(g&&g.l) e.add(g.l); }));
  return e;
}
function getUsed() {
  return new Set(Object.values(picks).filter(Boolean));
}
function getTeamMeta(name) {
  return TEAMS.find(t => t.team === name);
}
function sdClass(seed) {
  if(!seed) return 'sdlo';
  if(seed===1) return 'sd1';
  if(seed===2) return 'sd2';
  if(seed===3) return 'sd3';
  if(seed===4) return 'sd4';
  if(seed<=7)  return 'sd567';
  return 'sdlo';
}
function rdotClass(region) {
  return {East:'rE',West:'rW',South:'rS',Midwest:'rM'}[region]||'';
}

// Get actual games for a day — for later rounds, derive from results
function getDayGames(dayIdx) {
  const day = DAYS[dayIdx];
  if(day.games.length > 0) return day.games;
  // For R32+, winners from prior days populate games
  // We store winners in results; for empty days return placeholder
  return [];
}

// Resolve actual winner-derived games for days with no pre-set games
// For simplicity: R32 Sat uses Thu winners pairs, R32 Sun uses Fri winners pairs
function getResolvedGames(dayIdx) {
  const day = DAYS[dayIdx];
  if(day.games.length > 0) return day.games;

  // Map days to their source days for bracket progression
  const sourceMap = {
    'sat-mar21': ['thu-mar19'], // R32 from Thu R64
    'sun-mar22': ['fri-mar20'], // R32 from Fri R64
    'thu-mar26': ['sat-mar21'], // S16 from Sat R32
    'fri-mar27': ['sun-mar22'], // S16 from Sun R32
    'sat-mar28': ['thu-mar26'], // E8 from Thu S16
    'sun-mar29': ['fri-mar27'], // E8 from Fri S16
    'sat-apr4':  ['sat-mar28','sun-mar29'], // F4 from both E8
    'mon-apr6':  ['sat-apr4'],  // Champ from F4
  };

  const srcDayIds = sourceMap[day.id];
  if(!srcDayIds) return [];

  let winners = [];
  srcDayIds.forEach(srcId => {
    const srcDay = DAYS.find(d=>d.id===srcId);
    const srcGames = getResolvedGames(DAYS.indexOf(srcDay));
    srcGames.forEach((g, gi) => {
      const r = results[srcId] && results[srcId][gi];
      winners.push(r ? r.w : `?? (win of ${g[0]}/${g[1]})`);
    });
  });

  // Pair winners: 0vs1, 2vs3, etc.
  const pairs = [];
  for(let i=0;i<winners.length;i+=2) {
    if(winners[i+1] !== undefined) pairs.push([winners[i], winners[i+1]]);
  }
  return pairs;
}

// ── SAVE / LOAD ──────────────────────────────────────────────────
function save() {
  try {
    localStorage.setItem('s26_picks', JSON.stringify(picks));
    localStorage.setItem('s26_results', JSON.stringify(results));
    localStorage.setItem('s26_plan', JSON.stringify(plan));
  } catch(e) {}
}
function load() {
  try {
    const p  = localStorage.getItem('s26_picks');
    const r  = localStorage.getItem('s26_results');
    const pl = localStorage.getItem('s26_plan');
    if(p)  picks   = JSON.parse(p);
    if(r)  { const lr=JSON.parse(r); Object.keys(lr).forEach(k=>{ results[k]=lr[k]; }); }
    if(pl) { const lpl=JSON.parse(pl); Object.keys(lpl).forEach(k=>{ if(plan[k]) plan[k]=lpl[k]; }); }
  } catch(e) {}
}
function expJSON() {
  const d = {v:3, t:new Date().toISOString(), picks, results, plan};
  const b = new Blob([JSON.stringify(d)],{type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download='survivor26.json'; a.click();
}
function impJSON(ev) {
  const f=ev.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=e=>{
    try {
      const d=JSON.parse(e.target.result);
      if(d.picks)   picks=d.picks;
      if(d.results) Object.keys(d.results).forEach(k=>{results[k]=d.results[k];});
      if(d.plan)    Object.keys(d.plan).forEach(k=>{ if(plan[k]) plan[k]=d.plan[k]; });
      save(); refreshAll(); showToast('Loaded ✓');
    } catch(e) { alert('Could not read file'); }
  };
  rd.readAsText(f); ev.target.value='';
}

  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
function changeDay(dir) {
  const next = currentDayIdx + dir;
  if(next < 0 || next >= DAYS.length) return;
  currentDayIdx = next;
  renderToday();
}
function refreshAll() {
  renderToday(); renderHistory(); renderResults(); renderPlan();
}
function closeModal() {
  document.getElementById('modal').style.display='none';
}

// ── TODAY PAGE ───────────────────────────────────────────────────
function renderToday() {
  const day  = DAYS[currentDayIdx];
  const elim = getElim();
  const used = getUsed();
  const games = getResolvedGames(currentDayIdx);

  // Day nav
  document.getElementById('day-name').textContent = day.label;
  document.getElementById('day-sub').textContent  = day.round;
  document.getElementById('prev-btn').disabled = currentDayIdx === 0;
  document.getElementById('next-btn').disabled = currentDayIdx === DAYS.length-1;

  // All unique teams playing today (not placeholders)
  const todayTeams = [...new Set(games.flat().filter(n=>!n.startsWith('??')))];
  const availToday = todayTeams.filter(n=>!elim.has(n)&&!used.has(n));

  // Stats
  const totalAlive = TEAMS.filter(t=>!elim.has(t.team)).length;
  const totalUsed  = used.size;
  const totalRemain= TEAMS.filter(t=>!elim.has(t.team)&&!used.has(t.team)).length - availToday.length;
  document.getElementById('st-used').textContent   = totalUsed;
  document.getElementById('st-alive').textContent  = totalAlive;
  document.getElementById('st-avail').textContent  = availToday.length;
  document.getElementById('st-remain').textContent = totalRemain;

  // My pick
  const myPick = picks[day.id];
  const pickEl = document.getElementById('pick-display');
  const pickLbl = document.getElementById('pick-status-label');

  if(myPick) {
    const tm = getTeamMeta(myPick);
    const isElim = elim.has(myPick);
    // Find result for this pick
    const gameIdx = games.findIndex(([a,b])=>a===myPick||b===myPick);
    const res = gameIdx>=0 && results[day.id] ? results[day.id][gameIdx] : null;
    let resultHtml='', resultColor='';
    if(res) {
      if(res.w===myPick){ resultHtml='✅ WIN'; resultColor='var(--green)'; }
      else { resultHtml='❌ LOSS'; resultColor='var(--red)'; }
    }
    pickLbl.innerHTML = res ? `<span style="color:${resultColor};font-weight:700;">${resultHtml}</span>` : '';
    pickEl.innerHTML=`<div class="pick-set">
      <span class="ps-seed ${sdClass(tm?tm.seed:0)}">${tm?tm.seed:'?'}</span>
      <div class="ps-info">
        <div class="ps-team">${myPick}</div>
        <div class="ps-sub">${tm?tm.region+' · Seed '+tm.seed:''}</div>
      </div>
      <button class="ps-clear" onclick="clearPick('${day.id}')">✕</button>
    </div>`;
  } else {
    pickLbl.textContent = '';
    pickEl.innerHTML=`<div class="pick-empty">
      <span>${availToday.length > 0 ? 'Tap a team below to set your pick' : 'No available teams today'}</span>
    </div>`;
  }

  // Teams list
  document.getElementById('games-label').textContent = `${day.label}'s games (${games.length} matchups)`;
  const cont = document.getElementById('today-teams');
  cont.innerHTML = '';

  if(games.length === 0) {
    cont.innerHTML='<div class="empty"><div class="emo">⏳</div>Games will be set once prior round results are entered.</div>';
    return;
  }

  games.forEach(([ta, tb], gi) => {
    const res = results[day.id] ? results[day.id][gi] : null;
    [ta,tb].forEach(name => {
      if(name.startsWith('??')) return;
      const tm = getTeamMeta(name);
      const isElim = elim.has(name);
      const isUsed = used.has(name) && picks[day.id]!==name;
      const isPick = picks[day.id]===name;
      const st = plan[name]?.status||'none';

      let cardClass='tprow';
      if(isPick)       cardClass+=' is-pick';
      else if(isElim)  cardClass+=' is-elim';
      else if(isUsed)  cardClass+=' is-used';
      else if(st==='use')   cardClass+=' plan-use';
      else if(st==='save')  cardClass+=' plan-save';
      else if(st==='maybe') cardClass+=' plan-maybe';
      else if(st==='skip')  cardClass+=' plan-skip';

      let rightHtml='';
      if(isPick)       rightHtml='<span class="tp-badge badge-pick">My Pick</span>';
      else if(isElim)  rightHtml='<span class="tp-badge badge-elim">Out</span>';
      else if(isUsed)  rightHtml='<span class="tp-badge badge-used">Used</span>';
      else {
        const ico = {use:'🎯',save:'⭐',maybe:'🤔',skip:'🚫'}[st]||'';
        if(ico) rightHtml=`<span class="plan-icon">${ico}</span>`;
      }

      // Result indicator
      let resHtml='';
      if(res) {
        if(res.w===name) resHtml='<span style="color:var(--green);font-size:14px;margin-right:4px;">✅</span>';
        else resHtml='<span style="color:var(--red);font-size:14px;margin-right:4px;">❌</span>';
      }

      const opp = name===ta ? tb : ta;

      const row=document.createElement('div');
      row.className=cardClass;
      row.innerHTML=`
        ${resHtml}
        <span class="tp-seed ${sdClass(tm?tm.seed:0)}">${tm?tm.seed:'?'}</span>
        <span class="rdot ${rdotClass(tm?tm.region:'')}"></span>
        <div class="tp-info">
          <div class="tp-team">${name}</div>
          <div class="tp-meta">${tm?tm.region:'?'} · vs ${opp.startsWith('??')?'TBD':opp}</div>
        </div>
        <div class="tp-right">${rightHtml}</div>
      `;
      if(!isElim && !isUsed) row.onclick=()=>openTodayModal(name, day.id, opp);
      cont.appendChild(row);
    });

    // Small vs divider
    const vs=document.createElement('div');
    vs.style.cssText='text-align:center;font-size:10px;color:var(--dim);margin:-4px 0 3px;font-weight:700;letter-spacing:.1em;';
    vs.textContent='— VS —';
    if(gi < games.length-1) cont.insertBefore(vs, cont.lastChild.nextSibling);
  });
}

function clearPick(dayId) {
  delete picks[dayId];
  save(); renderToday(); renderHistory();
}

function openTodayModal(name, dayId, opp) {
  const tm = getTeamMeta(name);
  const st = plan[name]?.status||'none';
  const isPick = picks[dayId]===name;

  document.getElementById('m-title').textContent = name;
  document.getElementById('m-sub').textContent = `${tm?'Seed '+tm.seed+' · '+tm.region:'?'} · vs ${opp.startsWith('??')?'TBD':opp}`;

  const opts = document.getElementById('m-opts');
  opts.innerHTML='';

  const options=[
    { ico:'🏀', lbl: isPick?'✓ This is your pick':'Set as my pick for this day', sub:`Lock in ${name} for ${DAYS.find(d=>d.id===dayId)?.label||dayId}`, action:()=>{ picks[dayId]=name; save(); renderToday(); renderHistory(); showToast(`✓ ${name} set!`); }, sel: isPick },
    { ico:'🎯', lbl:'Mark: Will use', sub:'Flag for planning — not your pick yet', action:()=>{ plan[name].status=plan[name].status==='use'?'none':'use'; save(); renderToday(); renderPlan(); showToast('Flagged: Will use'); }, sel:st==='use' },
    { ico:'⭐', lbl:'Mark: Save for later', sub:'Hold back for Sweet 16 or later', action:()=>{ plan[name].status=plan[name].status==='save'?'none':'save'; save(); renderToday(); renderPlan(); showToast('Flagged: Saving'); }, sel:st==='save' },
    { ico:'🤔', lbl:'Mark: Maybe', sub:'Keeping as an option', action:()=>{ plan[name].status=plan[name].status==='maybe'?'none':'maybe'; save(); renderToday(); renderPlan(); showToast('Flagged: Maybe'); }, sel:st==='maybe' },
    { ico:'🚫', lbl:'Mark: Skip', sub:"Not using this team", action:()=>{ plan[name].status=plan[name].status==='skip'?'none':'skip'; save(); renderToday(); renderPlan(); showToast('Flagged: Skip'); }, sel:st==='skip' },
  ];

  options.forEach(o=>{
    const d=document.createElement('div');
    d.className='modal-option'+(o.sel?' sel':'');
    d.innerHTML=`<span class="mo-ico">${o.ico}</span><div><div class="mo-lbl">${o.lbl}</div><div class="mo-sub">${o.sub}</div></div>`;
    d.onclick=()=>{ o.action(); closeModal(); };
    opts.appendChild(d);
  });

  document.getElementById('modal').style.display='flex';
}

// ── HISTORY PAGE ─────────────────────────────────────────────────
function renderHistory() {
  const cont=document.getElementById('history-list');
  cont.innerHTML='';
  const elim=getElim();
  const pickDays=DAYS.filter(d=>picks[d.id]);

  if(pickDays.length===0){
    cont.innerHTML='<div class="empty"><div class="emo">📋</div>No picks yet.<br>Go to Today to make your first pick.</div>';
    return;
  }

  [...pickDays].reverse().forEach(day=>{
    const name=picks[day.id];
    const tm=getTeamMeta(name);
    const games=getResolvedGames(DAYS.indexOf(day));
    const gameIdx=games.findIndex(([a,b])=>a===name||b===name);
    const res=gameIdx>=0&&results[day.id]?results[day.id][gameIdx]:null;
    let cls='hist-pick pending', resultHtml='<span class="hp-result result-pending">Pending</span>';
    if(res){
      if(res.w===name){ cls='hist-pick won'; resultHtml='<span class="hp-result result-win">WIN ✓</span>'; }
      else { cls='hist-pick lost'; resultHtml='<span class="hp-result result-loss">LOSS ✗</span>'; }
    }
    const opp=games[gameIdx]?games[gameIdx].find(n=>n!==name):'?';

    const lbl=document.createElement('div');
    lbl.className='hist-day-label';
    lbl.textContent=day.label+' · '+day.round;
    cont.appendChild(lbl);

    const pick=document.createElement('div');
    pick.className=cls;
    pick.innerHTML=`
      <span class="hp-seed ${sdClass(tm?tm.seed:0)}">${tm?tm.seed:'?'}</span>
      <div class="hp-info">
        <div class="hp-team">${name}</div>
        <div class="hp-sub">${tm?tm.region+' · Seed '+tm.seed:''} · vs ${opp&&!opp.startsWith('??')?opp:'TBD'}</div>
      </div>
      ${resultHtml}
    `;
    cont.appendChild(pick);
  });
}

// ── RESULTS PAGE ─────────────────────────────────────────────────
function renderResults() {
  const cont=document.getElementById('results-list');
  cont.innerHTML='';

  DAYS.forEach((day, di)=>{
    const games=getResolvedGames(di);
    if(games.length===0) return;
    // Only show days that have started (prior day has results or it's the first day)
    if(di>0){
      const prevHasResults=DAYS.slice(0,di).some(d=>Object.keys(results[d.id]||{}).length>0);
      const hasPrev=DAYS.slice(0,di).some(d=>getResolvedGames(DAYS.indexOf(d)).length>0);
      // Show if: it has games that can be played AND (it has results OR prev days have results OR di<=3)
      if(di>3&&!prevHasResults&&Object.keys(results[day.id]||{}).length===0) return;
    }

    const entered=Object.keys(results[day.id]||{}).length;
    const lbl=document.createElement('div');
    lbl.className='hist-day-label';
    lbl.textContent=`${day.label} · ${day.round}`;
    cont.appendChild(lbl);

    games.forEach(([ta,tb],gi)=>{
      const res=results[day.id]?results[day.id][gi]:null;
      const phA=ta.startsWith('??'),phB=tb.startsWith('??');
      const tmA=getTeamMeta(ta),tmB=getTeamMeta(tb);
      const wA=res&&res.w===ta,lA=res&&res.l===ta;
      const wB=res&&res.w===tb,lB=res&&res.l===tb;

      const gc=document.createElement('div');
      gc.className='game-card';
      gc.innerHTML=`<div class="game-hdr">Game ${gi+1}</div>`;

      [
        {name:ta,tm:tmA,won:wA,lost:lA,ph:phA,opp:tb},
        {name:tb,tm:tmB,won:wB,lost:lB,ph:phB,opp:ta},
      ].forEach(({name,tm,won,lost,ph,opp})=>{
        const row=document.createElement('div');
        row.className='game-team-row'+(won?' won':lost?' lost':'');
        row.innerHTML=`
          <span class="gtr-seed ${sdClass(tm?tm.seed:0)}">${tm?tm.seed:'?'}</span>
          <span class="gtr-name">${name}</span>
          <span class="gtr-ico">${won?'✅':lost?'❌':ph?'⏳':'<span style="font-size:11px;color:var(--muted)">tap if won</span>'}</span>
        `;
        if(!res&&!ph) row.onclick=()=>{ recordResult(day.id,gi,name,opp); };
        gc.appendChild(row);
      });

      if(res){
        const ur=document.createElement('div');
        ur.className='undo-row';
        ur.innerHTML=`<button class="undo-btn" onclick="undoResult('${day.id}',${gi})">↩ Undo</button>`;
        gc.appendChild(ur);
      }
      cont.appendChild(gc);
    });
  });
}

function recordResult(dayId,gi,w,l){
  if(!results[dayId]) results[dayId]={};
  results[dayId][gi]={w,l};
  // Clear future days' results that depend on this (cascading bracket)
  const dayIdx=DAYS.findIndex(d=>d.id===dayId);
  DAYS.slice(dayIdx+1).forEach(d=>{
    if(d.games.length===0) results[d.id]={};
  });
  save(); refreshAll(); showToast(`${w} wins ✓`);
}
function undoResult(dayId,gi){
  delete results[dayId][gi];
  const dayIdx=DAYS.findIndex(d=>d.id===dayId);
  DAYS.slice(dayIdx+1).forEach(d=>{
    if(d.games.length===0) results[d.id]={};
  });
  save(); refreshAll();
}

// ── PLAN PAGE ────────────────────────────────────────────────────
function setPlanFilter(f,btn){
  planFilter=f;
  document.querySelectorAll('.pchip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPlan();
}

function renderPlan(){
  const elim=getElim();
  const used=getUsed();
  const cont=document.getElementById('plan-list');
  cont.innerHTML='';

  const tiers=[
    {label:'1 seeds — Save for Final Four',seeds:[1]},
    {label:'2 seeds — Sweet 16 or later',seeds:[2]},
    {label:'3–4 seeds — Best early picks',seeds:[3,4]},
    {label:'5–7 seeds — Solid mid options',seeds:[5,6,7]},
    {label:'8–11 seeds — Risky',seeds:[8,9,10,11]},
    {label:'12–16 seeds — Avoid',seeds:[12,13,14,15,16]},
  ];

  // Unique teams (no dupes from First Four)
  const seen=new Set();
  const allTeams=TEAMS.filter(t=>{ if(seen.has(t.team))return false; seen.add(t.team);return true; });

  tiers.forEach(tier=>{
    const tierTeams=allTeams.filter(t=>{
      if(!tier.seeds.includes(t.seed)) return false;
      const isElim=elim.has(t.team);
      const isUsed=used.has(t.team);
      const st=plan[t.team]?.status||'none';
      if(planFilter==='all') return true;
      if(planFilter==='available') return !isElim&&!isUsed;
      if(planFilter==='used') return isUsed;
      if(planFilter==='elim') return isElim;
      return st===planFilter;
    });
    if(tierTeams.length===0) return;

    const lbl=document.createElement('div');
    lbl.className='hist-day-label';
    lbl.textContent=tier.label;
    cont.appendChild(lbl);

    tierTeams.sort((a,b)=>a.seed-b.seed||a.region.localeCompare(b.region));
    tierTeams.forEach(t=>{
      const isElim=elim.has(t.team);
      const isUsed=used.has(t.team);
      const st=plan[t.team]?.status||'none';
      const usedDay=isUsed?Object.entries(picks).find(([d,n])=>n===t.team):null;

      let cls='plan-team';
      if(isElim) cls+=' s-elim';
      else if(isUsed) cls+=' s-used';
      else if(st!=='none') cls+=' s-'+st;

      let right='';
      if(isElim) right='<span class="tp-badge badge-elim">💀 Out</span>';
      else if(isUsed) right=`<span class="tp-badge badge-used">Used${usedDay?' '+DAYS.find(d=>d.id===usedDay[0])?.label.split(' ')[0]:''}+</span>`;
      else right=`<div class="pt-btns">
        <button class="ptbtn${st==='use'?' on-use':''}" onclick="togglePlan(event,'${t.team}','use')">🎯</button>
        <button class="ptbtn${st==='save'?' on-save':''}" onclick="togglePlan(event,'${t.team}','save')">⭐</button>
        <button class="ptbtn${st==='maybe'?' on-maybe':''}" onclick="togglePlan(event,'${t.team}','maybe')">🤔</button>
        <button class="ptbtn${st==='skip'?' on-skip':''}" onclick="togglePlan(event,'${t.team}','skip')">🚫</button>
      </div>`;

      const row=document.createElement('div');
      row.className=cls;
      row.innerHTML=`
        <span class="pt-seed ${sdClass(t.seed)}">${t.seed}</span>
        <span class="rdot ${rdotClass(t.region)}"></span>
        <div class="pt-info">
          <div class="pt-team">${t.team}</div>
          <div class="pt-sub">${t.region}</div>
        </div>
        ${right}
      `;
      cont.appendChild(row);
    });
  });

  if(cont.children.length===0) cont.innerHTML='<div class="empty"><div class="emo">🔍</div>No teams match this filter.</div>';
}

function togglePlan(e,name,st){
  e.stopPropagation();
  plan[name].status=plan[name].status===st?'none':st;
  save(); renderPlan(); renderToday();
}

// ── INIT ─────────────────────────────────────────────────────────
load();
// Jump to first day with games if no picks yet
if(Object.keys(picks).length===0) currentDayIdx=2;
renderToday();
</script>
</body>
