<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Survivor Pool — Nick, Matt, Gene</title>
<style>
:root{
  --bg:#0f1117;--card:#1a1d27;--card2:#222536;--border:#2e3248;
  --text:#f0f2ff;--muted:#7b80a0;--dim:#3a3f58;
  --green:#22c55e;--gbg:#0d2818;--gdim:#134d28;
  --red:#ef4444;--rbg:#2a0d0d;
  --amber:#f59e0b;--abg:#2a1d05;
  --blue:#3b82f6;--bbg:#0d1a2e;
  --purple:#a855f7;
  --nick:#3b82f6;--matt:#a855f7;--gene:#f59e0b;
  --r:12px;--rsm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);max-width:620px;margin:0 auto;padding-bottom:60px;}
.hdr{padding:16px 14px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:50;}
.hdr h1{font-size:17px;font-weight:800;}
.hdr p{font-size:11px;color:var(--muted);margin-top:1px;}
.hdr-r{display:flex;gap:6px;}
.icobtn{height:32px;padding:0 10px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;}
.players{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px;}
.player-card{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:12px;text-align:center;}
.player-card.elim{opacity:.5;border-color:#3a1515!important;background:var(--rbg);}
.pc-name{font-size:15px;font-weight:800;margin-bottom:3px;}
.pc-status{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.pc-wins{font-size:11px;color:var(--muted);margin-bottom:6px;}
.pc-edge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:700;border:1px solid;display:inline-block;}
.edge-s{background:var(--gbg);color:var(--green);border-color:var(--gdim);}
.edge-m{background:var(--abg);color:var(--amber);border-color:#92400e;}
.edge-w{background:var(--rbg);color:var(--red);border-color:#7f1d1d;}
.day-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);}
.dnbtn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
.dnbtn:disabled{opacity:.2;cursor:default;}
.day-center{text-align:center;}
.day-name{font-size:16px;font-weight:800;}
.day-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.section{padding:12px 14px;}
.sec-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:4px 0 10px;display:flex;align-items:center;gap:8px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border);}
.pick-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.plbl{width:44px;font-size:12px;font-weight:700;flex-shrink:0;}
.plbl.nick{color:var(--nick)}.plbl.matt{color:var(--matt)}.plbl.gene{color:var(--gene)}
.pick-sel{flex:1;height:38px;background:var(--card2);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text);font-size:13px;font-family:inherit;padding:0 10px;outline:none;cursor:pointer;}
.pick-sel.picked{border-color:var(--green);}
.rbadge{font-size:11px;font-weight:700;padding:4px 8px;border-radius:6px;flex-shrink:0;min-width:46px;text-align:center;}
.rb-w{background:var(--gbg);color:var(--green);border:1px solid var(--gdim);}
.rb-l{background:var(--rbg);color:var(--red);border:1px solid #4a1515;}
.rb-p{background:var(--card2);color:var(--muted);border:1px solid var(--border);}
.res-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.res-team{flex:1;font-size:13px;font-weight:600;}
.rbtn{padding:6px 12px;border-radius:var(--rsm);border:1px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--card2);color:var(--muted);}
.rbtn.win-on{background:var(--green);color:#000;border-color:var(--green);}
.rbtn.loss-on{background:var(--red);color:#fff;border-color:var(--red);}
.hist-wrap{padding:0 14px 20px;overflow-x:auto;}
.hist-table{width:100%;border-collapse:collapse;font-size:12px;min-width:360px;}
.hist-table th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;background:var(--card2);border-bottom:1px solid var(--border);}
.hist-table td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
.hist-table tr:last-child td{border-bottom:none;}
.chip{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;border:1px solid;}
.chip-w{background:var(--gbg);border-color:var(--gdim);color:var(--green);}
.chip-l{background:var(--rbg);border-color:#4a1515;color:var(--red);text-decoration:line-through;opacity:.7;}
.chip-p{background:var(--card2);border-color:var(--border);color:var(--muted);}
.chip-none{color:var(--dim);font-style:italic;font-size:11px;}
.edge-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;}
.edge-card h3{font-size:13px;font-weight:700;margin-bottom:10px;}
.eteam{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid;margin:2px;}
.et-good{background:var(--gbg);color:var(--green);border-color:var(--gdim);}
.et-ok{background:var(--card2);color:var(--muted);border-color:var(--border);}
.sync-bar{padding:8px 14px;font-size:11px;font-weight:600;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.sync-status{font-size:11px;}
.sync-btn{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:9px 18px;border-radius:20px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .18s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;}
.empty{text-align:center;padding:24px;color:var(--muted);font-size:13px;}
.elim-tag{font-size:11px;color:var(--red);font-style:italic;}
.setup-box{margin:14px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);}
.setup-box p{font-size:13px;color:var(--muted);margin-bottom:12px;line-height:1.6;}
.setup-input{width:100%;height:38px;background:var(--card2);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text);font-size:13px;font-family:inherit;padding:0 10px;outline:none;margin-bottom:8px;}
.setup-save{width:100%;padding:12px;background:var(--blue);border:none;border-radius:var(--rsm);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<div class="hdr">
  <div><h1>🏀 Pool Tracker</h1><p id="sync-status">Nick · Matt · Gene · 2026</p></div>
  <div class="hdr-r">
    <button class="icobtn" onclick="manualSync()">☁️</button>
    <button class="icobtn" onclick="expJSON()">📤</button>
    <button class="icobtn" onclick="document.getElementById('fimp').click()">📥</button>
    <input type="file" id="fimp" accept=".json" style="display:none" onchange="impJSON(event)">
  </div>
</div>

<div id="setup-section" style="display:none;">
  <div class="setup-box">
    <p>Paste your Google Apps Script URL to sync picks across all devices. Use the same URL from your personal planner.</p>
    <input class="setup-input" id="url-input" type="url" placeholder="https://script.google.com/macros/s/...">
    <button class="setup-save" onclick="saveUrl()">Save & sync</button>
  </div>
</div>

<div id="main-section">
  <div class="players" id="players"></div>
  <div class="day-nav">
    <button class="dnbtn" id="prev-btn" onclick="changeDay(-1)">&#8249;</button>
    <div class="day-center"><div class="day-name" id="day-name">-</div><div class="day-sub" id="day-sub">-</div></div>
    <button class="dnbtn" id="next-btn" onclick="changeDay(1)">&#8250;</button>
  </div>
  <div class="section"><div class="sec-lbl">Picks</div><div id="picks-entry"></div></div>
  <div class="hist-wrap"><div class="sec-lbl" style="padding:4px 0 10px;">History</div><table class="hist-table"><thead><tr><th>Day</th><th style="color:var(--nick)">Nick</th><th style="color:var(--matt)">Matt</th><th style="color:var(--gene)">Gene</th></tr></thead><tbody id="hist-body"></tbody></table></div>
  <div class="section"><div class="sec-lbl">Edge analysis</div><div id="edge"></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const PLAYERS=[{id:'nick',name:'Nick',color:'var(--nick)'},{id:'matt',name:'Matt',color:'var(--matt)'},{id:'gene',name:'Gene',color:'var(--gene)'}];
const ALL_TEAMS=[
  {seed:1,name:'Duke'},{seed:1,name:'Michigan'},{seed:1,name:'Arizona'},{seed:1,name:'Florida'},
  {seed:2,name:'Houston'},{seed:2,name:'UConn'},{seed:2,name:'Purdue'},{seed:2,name:'Iowa State'},
  {seed:3,name:'Michigan State'},{seed:3,name:'Gonzaga'},{seed:3,name:'Virginia'},{seed:3,name:'Illinois'},
  {seed:4,name:'Kansas'},{seed:4,name:'Nebraska'},{seed:4,name:'Arkansas'},{seed:4,name:'Alabama'},
  {seed:5,name:'Vanderbilt'},{seed:5,name:'Wisconsin'},{seed:5,name:"St. John's"},{seed:5,name:'Texas Tech'},
  {seed:6,name:'Louisville'},{seed:6,name:'North Carolina'},{seed:6,name:'BYU'},{seed:6,name:'Tennessee'},
  {seed:7,name:"Saint Mary's"},{seed:7,name:'UCLA'},{seed:7,name:'Miami (FL)'},{seed:7,name:'Kentucky'},
  {seed:8,name:'Ohio State'},{seed:8,name:'Clemson'},{seed:8,name:'Villanova'},{seed:8,name:'Georgia'},
  {seed:9,name:'TCU'},{seed:9,name:'Iowa'},{seed:9,name:'Utah State'},{seed:9,name:'Saint Louis'},
  {seed:10,name:'UCF'},{seed:10,name:'Missouri'},{seed:10,name:'Santa Clara'},{seed:10,name:'Texas A&M'},
  {seed:11,name:'South Florida'},{seed:11,name:'VCU'},{seed:11,name:'Texas/NC State'},{seed:11,name:'SMU/Miami OH'},
  {seed:12,name:'Northern Iowa'},{seed:12,name:'High Point'},{seed:12,name:'Akron'},{seed:12,name:'McNeese'},
  {seed:13,name:'Cal Baptist'},{seed:13,name:'Hawaii'},{seed:13,name:'Hofstra'},{seed:13,name:'Troy'},
  {seed:14,name:'North Dakota St.'},{seed:14,name:'Kennesaw State'},{seed:14,name:'Penn'},{seed:14,name:'Wright State'},
  {seed:15,name:'Furman'},{seed:15,name:'Queens'},{seed:15,name:'Idaho'},{seed:15,name:'Tennessee State'},
  {seed:16,name:'Siena'},{seed:16,name:'LIU'},{seed:16,name:'PV A&M/Lehigh'},{seed:16,name:'UMBC/Howard'},
];
const DAY_TEAMS={
  'thu-mar19':['Duke','Michigan State','Gonzaga','Virginia','Illinois','Nebraska','Arkansas','Vanderbilt','Wisconsin','Louisville','North Carolina','BYU',"Saint Mary's",'Ohio State','Georgia','Houston','TCU','Saint Louis','Texas A&M','VCU','South Florida','Texas/NC State','High Point','McNeese','Troy','Hawaii','North Dakota St.','Kennesaw State','Wright State','Idaho','Siena','UMBC/Howard'],
  'fri-mar20':['Arizona','Florida','Michigan','UConn','Purdue','Iowa State','Kansas','Alabama',"St. John's",'Tennessee','UCLA','Kentucky','Miami (FL)','Clemson','Villanova','Iowa','Utah State','UCF','Missouri','Santa Clara','SMU/Miami OH','Akron','Northern Iowa','Cal Baptist','Hofstra','Penn','Furman','Queens','Tennessee State','LIU','PV A&M/Lehigh'],
};
['sat-mar21','sun-mar22','thu-mar26','fri-mar27','sat-mar28','sun-mar29','sat-apr4','mon-apr6'].forEach(d=>{
  DAY_TEAMS[d]=ALL_TEAMS.map(t=>t.name);
});
const DAYS=[
  {id:'thu-mar19',label:'Thu Mar 19',round:'Round of 64'},
  {id:'fri-mar20',label:'Fri Mar 20',round:'Round of 64'},
  {id:'sat-mar21',label:'Sat Mar 21',round:'Round of 32'},
  {id:'sun-mar22',label:'Sun Mar 22',round:'Round of 32'},
  {id:'thu-mar26',label:'Thu Mar 26',round:'Sweet 16'},
  {id:'fri-mar27',label:'Fri Mar 27',round:'Sweet 16'},
  {id:'sat-mar28',label:'Sat Mar 28',round:'Elite Eight'},
  {id:'sun-mar29',label:'Sun Mar 29',round:'Elite Eight'},
  {id:'sat-apr4', label:'Sat Apr 4', round:'Final Four'},
  {id:'mon-apr6', label:'Mon Apr 6', round:'Championship'},
];

let picks={},results={};
DAYS.forEach(d=>{picks[d.id]={};results[d.id]={};});
let curDay=0;
let syncTimer=null;

// Use pool_ prefix so it doesn't clash with personal planner in same sheet
const STORE_KEY='pool26_data';

function getUrl(){return localStorage.getItem('pool26_scriptUrl')||'';}
function setSyncStatus(msg,color){const el=document.getElementById('sync-status');if(el){el.textContent=msg;el.style.color=color||'var(--muted)';}}

function getUsed(pid){const u=new Set();DAYS.forEach(d=>{if(picks[d.id]?.[pid])u.add(picks[d.id][pid]);});return u;}
function isElim(pid){for(const d of DAYS){const p=picks[d.id]?.[pid];if(p&&results[d.id]?.[p]==='loss')return true;}return false;}
function getWins(pid){let w=0;DAYS.forEach(d=>{const p=picks[d.id]?.[pid];if(p&&results[d.id]?.[p]==='win')w++;});return w;}
function edgeScore(pid){const used=getUsed(pid);let s=0;ALL_TEAMS.forEach(t=>{if(!used.has(t.name)){s+=t.seed<=2?10:t.seed<=4?6:t.seed<=7?3:1;}});return s;}

function buildPayload(){return {pool_picks:picks,pool_results:results,pool_saved:new Date().toISOString()};}

function saveLocal(){
  try{localStorage.setItem('pool26p',JSON.stringify(picks));localStorage.setItem('pool26r',JSON.stringify(results));}catch(e){}
}
function loadLocal(){
  try{
    const p=localStorage.getItem('pool26p'),r=localStorage.getItem('pool26r');
    if(p){const v=JSON.parse(p);DAYS.forEach(d=>{if(v[d.id])picks[d.id]=v[d.id];});}
    if(r){const v=JSON.parse(r);DAYS.forEach(d=>{if(v[d.id])results[d.id]=v[d.id];});}
  }catch(e){}
}

function save(){
  saveLocal();
  if(getUrl()){
    clearTimeout(syncTimer);
    setSyncStatus('Saving...','var(--amber)');
    syncTimer=setTimeout(()=>pushToCloud(),1500);
  }
}

async function pushToCloud(){
  const url=getUrl();if(!url)return;
  try{
    const encoded=encodeURIComponent(JSON.stringify(buildPayload()));
    await fetch(url+'?action=save&data='+encoded,{mode:'no-cors'});
    const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    setSyncStatus('Synced '+t,'var(--green)');
  }catch(e){setSyncStatus('Sync failed','var(--red)');}
}

async function pullFromCloud(){
  const url=getUrl();
  if(!url){setSyncStatus('Nick · Matt · Gene · 2026','var(--muted)');return;}
  setSyncStatus('Syncing...','var(--amber)');
  try{
    const res=await fetch(url+'?action=load',{cache:'no-store'});
    const text=await res.text();
    const jsonStr=text.includes('{"ok"')?text.substring(text.indexOf('{"ok"')):text;
    const json=JSON.parse(jsonStr);
    if(json.ok&&json.data&&json.data.pool_picks){
      const d=json.data;
      if(d.pool_picks) DAYS.forEach(dy=>{if(d.pool_picks[dy.id])picks[dy.id]=d.pool_picks[dy.id];});
      if(d.pool_results) DAYS.forEach(dy=>{if(d.pool_results[dy.id])results[dy.id]=d.pool_results[dy.id];});
      saveLocal();refresh();
    }
    const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    setSyncStatus('Synced '+t,'var(--green)');
  }catch(e){
    const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    setSyncStatus('Synced '+t,'var(--green)');
  }
}

function manualSync(){pullFromCloud();}

function saveUrl(){
  const val=document.getElementById('url-input').value.trim();
  if(!val){alert('Please paste your Apps Script URL.');return;}
  localStorage.setItem('pool26_scriptUrl',val);
  document.getElementById('setup-section').style.display='none';
  document.getElementById('main-section').style.display='block';
  toast('URL saved — syncing...');
  pullFromCloud();
}

function expJSON(){const b=new Blob([JSON.stringify({v:1,picks,results})],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='pool2026.json';a.click();}
function impJSON(ev){const f=ev.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.picks)DAYS.forEach(dy=>{if(d.picks[dy.id])picks[dy.id]=d.picks[dy.id];});if(d.results)DAYS.forEach(dy=>{if(d.results[dy.id])results[dy.id]=d.results[dy.id];});save();refresh();toast('Loaded');}catch(e){alert('Bad file');}};rd.readAsText(f);ev.target.value='';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
function changeDay(d){const n=curDay+d;if(n<0||n>=DAYS.length)return;curDay=n;refresh();}

function renderPlayers(){const cont=document.getElementById('players');cont.innerHTML='';const scores=PLAYERS.map(p=>edgeScore(p.id));const maxS=Math.max(...scores,1);PLAYERS.forEach((p,i)=>{const e=isElim(p.id),w=getWins(p.id),s=scores[i],pct=s/maxS;const ecls=e?'':pct>.7?'edge-s':pct>.4?'edge-m':'edge-w';const etxt=e?'':pct>.7?'Strong edge':pct>.4?'Moderate':'Weak edge';const div=document.createElement('div');div.className='player-card'+(e?' elim':'');div.style.borderColor=e?'':p.color;div.innerHTML=`<div class="pc-name" style="color:${p.color}">${p.name}</div><div class="pc-status" style="color:${e?'var(--red)':'var(--green)'}">${e?'Eliminated':'Alive'}</div><div class="pc-wins">${w} win${w!==1?'s':''}</div>${!e?`<span class="pc-edge ${ecls}">${etxt}</span>`:''}`;cont.appendChild(div);});}
function renderDay(){const day=DAYS[curDay];document.getElementById('day-name').textContent=day.label;document.getElementById('day-sub').textContent=day.round;document.getElementById('prev-btn').disabled=curDay===0;document.getElementById('next-btn').disabled=curDay===DAYS.length-1;}
function renderPicks(){const day=DAYS[curDay];const cont=document.getElementById('picks-entry');cont.innerHTML='';PLAYERS.forEach(p=>{const e=isElim(p.id),used=getUsed(p.id);const curPick=picks[day.id]?.[p.id]||'';const res=curPick?results[day.id]?.[curPick]:null;const row=document.createElement('div');row.className='pick-row';const lbl=document.createElement('div');lbl.className='plbl '+p.id;lbl.textContent=p.name;row.appendChild(lbl);if(e){const t=document.createElement('div');t.className='elim-tag';t.textContent='Eliminated';row.appendChild(t);}else{const sel=document.createElement('select');sel.className='pick-sel'+(curPick?' picked':'');sel.innerHTML='<option value="">- no pick -</option>';const todayNames=new Set(DAY_TEAMS[day.id]||[]);const todayTeams=ALL_TEAMS.filter(t=>todayNames.has(t.name));const avail=todayTeams.filter(t=>!used.has(t.name));const usedArr=todayTeams.filter(t=>used.has(t.name));if(avail.length){const g=document.createElement('optgroup');g.label='Available';avail.sort((a,b)=>a.seed-b.seed).forEach(t=>{const o=document.createElement('option');o.value=t.name;o.textContent=t.seed+' '+t.name;if(t.name===curPick)o.selected=true;g.appendChild(o);});sel.appendChild(g);}if(usedArr.length){const g=document.createElement('optgroup');g.label='Already used';usedArr.sort((a,b)=>a.seed-b.seed).forEach(t=>{const o=document.createElement('option');o.value=t.name;o.textContent=t.seed+' '+t.name+' (used)';o.disabled=true;g.appendChild(o);});sel.appendChild(g);}sel.onchange=()=>{if(sel.value)picks[day.id][p.id]=sel.value;else delete picks[day.id][p.id];save();refresh();};row.appendChild(sel);const badge=document.createElement('div');badge.className='rbadge '+(res==='win'?'rb-w':res==='loss'?'rb-l':'rb-p');badge.textContent=res==='win'?'WIN':res==='loss'?'LOSS':'—';row.appendChild(badge);}cont.appendChild(row);});const todayPicks=[...new Set(Object.values(picks[day.id]).filter(Boolean))];if(todayPicks.length){const lbl=document.createElement('div');lbl.className='sec-lbl';lbl.style.marginTop='14px';lbl.textContent='Results';cont.appendChild(lbl);todayPicks.forEach(tn=>{const res=results[day.id]?.[tn];const rr=document.createElement('div');rr.className='res-row';const nm=document.createElement('div');nm.className='res-team';nm.textContent=tn;rr.appendChild(nm);const wb=document.createElement('button');wb.className='rbtn'+(res==='win'?' win-on':'');wb.textContent='WIN';wb.onclick=()=>{results[day.id][tn]=res==='win'?undefined:'win';if(!results[day.id][tn])delete results[day.id][tn];save();refresh();toast(tn+' WIN');};const lb=document.createElement('button');lb.className='rbtn'+(res==='loss'?' loss-on':'');lb.textContent='LOSS';lb.onclick=()=>{results[day.id][tn]=res==='loss'?undefined:'loss';if(!results[day.id][tn])delete results[day.id][tn];save();refresh();toast(tn+' LOSS');};rr.appendChild(wb);rr.appendChild(lb);cont.appendChild(rr);});}}
function renderHistory(){const tbody=document.getElementById('hist-body');tbody.innerHTML='';const active=DAYS.filter(d=>PLAYERS.some(p=>picks[d.id]?.[p.id]));if(!active.length){tbody.innerHTML='<tr><td colspan="4" class="empty">No picks yet.</td></tr>';return;}active.forEach(day=>{const tr=document.createElement('tr');let c=`<td style="font-size:11px;font-weight:700;color:var(--muted);">${day.label.replace(/\w+ /,'')}<br><span style="font-size:9px;color:var(--dim);font-weight:400">${day.round}</span></td>`;PLAYERS.forEach(p=>{const pick=picks[day.id]?.[p.id],res=pick?results[day.id]?.[pick]:null;const elimBefore=DAYS.slice(0,DAYS.indexOf(day)).some(d=>{const pp=picks[d.id]?.[p.id];return pp&&results[d.id]?.[pp]==='loss';});if(!pick)c+=`<td>${elimBefore?'<span style="color:var(--red);font-size:12px;">💀</span>':'<span class="chip-none">—</span>'}</td>`;else{const cls=res==='win'?'chip-w':res==='loss'?'chip-l':'chip-p';c+=`<td><span class="chip ${cls}">${res==='win'?'✓ ':res==='loss'?'✗ ':''}${pick}</span></td>`;}});tr.innerHTML=c;tbody.appendChild(tr);});}
function renderEdge(){const cont=document.getElementById('edge');cont.innerHTML='';PLAYERS.forEach(p=>{if(isElim(p.id))return;const used=getUsed(p.id);const rem=ALL_TEAMS.filter(t=>!used.has(t.name)).sort((a,b)=>a.seed-b.seed);const usedList=ALL_TEAMS.filter(t=>used.has(t.name)).sort((a,b)=>a.seed-b.seed);const card=document.createElement('div');card.className='edge-card';card.style.borderColor=p.color;card.innerHTML=`<h3><span style="color:${p.color}">${p.name}</span> — ${rem.length} teams left</h3>`;const list=document.createElement('div');rem.slice(0,10).forEach(t=>{const s=document.createElement('span');s.className='eteam '+(t.seed<=4?'et-good':'et-ok');s.textContent=t.seed+' '+t.name;list.appendChild(s);});if(rem.length>10){const s=document.createElement('span');s.className='eteam et-ok';s.textContent='+'+(rem.length-10)+' more';list.appendChild(s);}card.appendChild(list);if(usedList.length){const u=document.createElement('div');u.style.cssText='margin-top:8px;font-size:10px;color:var(--muted);';u.textContent='Used: '+usedList.map(t=>t.name).join(', ');card.appendChild(u);}cont.appendChild(card);});if(!cont.children.length)cont.innerHTML='<div class="empty">All players eliminated.</div>';}

function refresh(){renderPlayers();renderDay();renderPicks();renderHistory();renderEdge();}

// Init
loadLocal();
const savedUrl=getUrl();
if(!savedUrl){
  document.getElementById('setup-section').style.display='block';
  document.getElementById('main-section').style.display='none';
} else {
  document.getElementById('setup-section').style.display='none';
  document.getElementById('main-section').style.display='block';
  pullFromCloud();
}
refresh();
</script>
</body>
</html>
